<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkyFetch Weather Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <header>
            <h1>🌤 SkyFetch Weather Dashboard</h1>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Enter city name..." />
            <button id="searchBtn">Search</button>
        </div>

        <!-- Current Weather Section -->
        <div id="weatherContainer" class="weather-card">
            <!-- Current weather will load here -->
        </div>

        <!-- Forecast Section -->
        <h2 class="forecast-title">5-Day Forecast</h2>
        <div id="forecastContainer" class="forecast-grid">
            <!-- Forecast cards will load here -->
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
